# fly.toml — generated for Fly.io deployment
app = "workspace-assistant-backend"
primary_region = "sin"  # Singapore — change to "bom" for Mumbai or "lax" for US West

[build]
  [build.args]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
